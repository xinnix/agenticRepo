# Docker Compose for Production
# Usage: docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# 生产环境部署配置
# - 连接外部 PostgreSQL 数据库
# - 包含健康检查和自动重启
# - 日志和资源限制配置

version: "3.8"

services:
  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-feedbackhub}-api:${TAG:-latest}
    container_name: feedbackhub-api-prod
    env_file:
      - 1panel.env
    environment:
      # 数据库配置（连接外部数据库）
      DATABASE_URL: ${DATABASE_URL}
      # 环境配置
      NODE_ENV: production
      PORT: ${API_PORT:-3000}
      # CORS 配置
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # JWT 认证配置
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      # 微信小程序配置
      WX_APP_ID: ${WX_APP_ID}
      WX_APP_SECRET: ${WX_APP_SECRET}
      # 文件存储配置
      FILE_STORAGE_PROVIDER: ${FILE_STORAGE_PROVIDER:-local}
      UPLOAD_PATH: ${UPLOAD_PATH:-./uploads}
      # 阿里云 OSS 配置
      OSS_ENDPOINT: ${OSS_ENDPOINT}
      OSS_REGION: ${OSS_REGION}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET}
      OSS_USE_SIGNED_URL: ${OSS_USE_SIGNED_URL:-false}
    ports:
      - "${API_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      - feedbackhub-network
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  admin:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-feedbackhub}-admin:${TAG:-latest}
    container_name: feedbackhub-admin-prod
    env_file:
      - 1panel.env
    environment:
      # 前端环境变量（构建时注入）
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/trpc}
    ports:
      - "${ADMIN_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - feedbackhub-network
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

networks:
  feedbackhub-network:
    driver: bridge
