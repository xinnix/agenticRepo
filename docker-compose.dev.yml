# Docker Compose for Development
# Usage: docker-compose -f docker-compose.dev.yml up
#
# 注意：此配置不包含 PostgreSQL，需要连接外部数据库
# 请在 .env 中配置 DATABASE_URL，或者直接在下面修改

version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: development
    container_name: feedbackhub-api-dev
    environment:
      # 数据库配置（连接外部数据库）
      # 方式 1: 从环境变量读取
      DATABASE_URL: ${DATABASE_URL}
      # 方式 2: 或者直接写在这里（开发测试用）
      # DATABASE_URL: postgresql://postgres:password@your-host:5432/feedbackhub
      # 环境配置
      NODE_ENV: development
      PORT: 3000
      # CORS 配置
      CORS_ORIGIN: "*"
      # JWT 认证配置
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      # 微信小程序配置
      WX_APP_ID: ${WX_APP_ID:-}
      WX_APP_SECRET: ${WX_APP_SECRET:-}
      # 文件存储配置
      FILE_STORAGE_PROVIDER: ${FILE_STORAGE_PROVIDER:-local}
      UPLOAD_PATH: ${UPLOAD_PATH:-./uploads}
      # 阿里云 OSS 配置
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_REGION: ${OSS_REGION:-oss-cn-hangzhou}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_USE_SIGNED_URL: ${OSS_USE_SIGNED_URL:-false}
    ports:
      - "3000:3000"
    volumes:
      # 只挂载源代码，保留 node_modules
      - ./apps/api/src:/app/apps/api/src
      - ./infra:/app/infra
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      target: development
    container_name: feedbackhub-admin-dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/trpc}
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      # 只挂载源代码，保留 node_modules
      - ./apps/admin/src:/app/apps/admin/src
      - ./infra:/app/infra
    restart: unless-stopped
